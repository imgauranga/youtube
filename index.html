<!DOCTYPE html>
<html lang="en">
<head>    
    <meta charset="UTF-8">    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">    
    <title>YouTube</title>    
    <meta name="theme-color" content="#1e1e24"/>    
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>    
    <link href='https://i.ibb.co/b52pjVWp/IMG-20260403-210738-880.webp' rel='icon' type='image/x-icon'/>    
    <link href='https://i.ibb.co/b52pjVWp/IMG-20260403-210738-880.webp' rel='shortcut icon' type='image/x-icon'/>    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">    
    <style>        
        :root {            
            --primary: #ff4757;            
            --bg-gradient: linear-gradient(135deg, #1e1e24, #111115);            
            --card-bg: rgba(255, 255, 255, 0.05);            
            --text-main: #ffffff;            
            --text-muted: #a0a0a5;            
            --popup-bg: rgba(20, 20, 25, 0.95);        
        }
        * {            
            margin: 0;            
            padding: 0;            
            box-sizing: border-box;            
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;        
        }
        /* Fixed Center Configuration for HTML & BODY */        
        html, body {            
            height: 100%;            
            width: 100%;            
            margin: 0;            
            padding: 0;            
            overflow: hidden;        
        }
        html {             
            -webkit-tap-highlight-color: rgba(0,0,0,0);             
            -webkit-user-select: none;             
            -webkit-touch-callout: none;             
            -moz-user-select: none;             
            -ms-user-select: none;             
            user-select: none;             
            scrollbar-width: none;             
            -ms-overflow-style: none;         
        }                 
        *::-webkit-scrollbar {             
            display: none !important;             
            width: 0px !important;             
            height: 0px !important;             
            background: transparent !important;         
        } 
        body {            
            background: var(--bg-gradient);            
            display: flex;            
            justify-content: center;            
            align-items: center;            
            color: var(--text-main);        
        }
        /* Background Animated Glow */        
        .blur-bg {            
            position: absolute;            
            width: 300px;            
            height: 300px;            
            background: var(--primary);            
            filter: blur(150px);            
            border-radius: 50%;            
            z-index: 0;            
            opacity: 0.3;            
            animation: float 6s ease-in-out infinite;        
        }
        @keyframes float {            
            0%, 100% { transform: translate(0, 0); }            
            50% { transform: translate(50px, 30px); }        
        }
        /* Main Player Container */        
        .player-container {            
            position: relative;            
            z-index: 1;            
            background: var(--card-bg);            
            backdrop-filter: blur(20px);            
            -webkit-backdrop-filter: blur(20px);            
            border: 1px solid rgba(255, 255, 255, 0.1);            
            padding: 30px;            
            border-radius: 24px;            
            width: 380px;            
            max-width: 90%;            
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);            
            text-align: center;        
        }
        /* 16:9 Video Wrapper responsive rule */        
        .video-wrapper {            
            position: relative;            
            width: 100%;            
            padding-bottom: 56.25%;            
            height: 0;            
            margin-bottom: 25px;            
            border-radius: 14px;            
            overflow: hidden;            
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);            
            background: #000;            
            border-top:6px solid #444444;        
        }
        .video-wrapper iframe {            
            position: absolute;            
            top: 0;            
            left: 0;            
            width: 100%;            
            height: 100%;            
            border: 0;        
        }
        /* Track Info */        
        .track-info h2 {            
            font-size: 1.25rem;            
            margin-bottom: 6px;            
            white-space: nowrap;            
            overflow: hidden;            
            text-overflow: ellipsis;        
        }
        .track-info p {            
            font-size: 0.9rem;            
            color: var(--text-muted);            
            margin-bottom: 25px;        
        }
        /* Progress Bar */        
        .progress-area {            
            height: 6px;            
            width: 100%;            
            background: rgba(255, 255, 255, 0.1);            
            border-radius: 3px;            
            cursor: pointer;            
            margin-bottom: 10px;            
            position: relative;        
        }
        .progress-bar {            
            height: 100%;            
            width: 0%;            
            background: var(--primary);            
            border-radius: 3px;            
            position: relative;            
            transition: width 0.1s linear;        
        }
        .time-duration {            
            display: flex;            
            justify-content: space-between;            
            font-size: 0.75rem;            
            color: var(--text-muted);            
            margin-bottom: 25px;        
        }
        /* Controls */        
        .controls {            
            display: flex;            
            justify-content: center;            
            align-items: center;            
            gap: 20px;            
            margin-bottom: 15px;        
        }
        .btn {            
            background: none;            
            border: none;            
            color: var(--text-main);            
            font-size: 1.2rem;            
            cursor: pointer;            
            transition: all 0.2s ease;        
        }
        .btn:hover {            
            color: var(--primary);            
            transform: scale(1.1);        
        }
        .btn-play {            
            width: 55px;            
            height: 55px;            
            border-radius: 50%;            
            background: var(--primary);            
            color: white;            
            font-size: 1.4rem;            
            display: flex;            
            justify-content: center;            
            align-items: center;            
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4);        
        }
        .btn-play:hover {            
            color: white;            
            transform: scale(1.05);        
        }
        /* Playlist Toggle Button */        
        .btn-playlist {            
            font-size: 1rem;            
            color: var(--text-muted);            
            display: flex;            
            align-items: center;            
            gap: 8px;             
            width:100%;            
            margin: 15px 0px 30px 0px;            
            padding: 12px 16px;            
            border-radius: 20px;            
            background: rgba(255, 255, 255, 0.03);            
            border: 1px solid rgba(255, 255, 255, 0.05);        
        }
        .btn-playlist:hover {            
            background: rgba(255, 255, 255, 0.1);            
            color: var(--text-main);        
        }
        /* POP-UP MODAL WINDOW (Playlist) */        
        .playlist-modal {            
            position: fixed;            
            top: 0;            
            left: 0;            
            width: 100%;            
            height: 100%;            
            background: rgba(0, 0, 0, 0.7);            
            backdrop-filter: blur(10px);            
            display: flex;            
            justify-content: center;            
            align-items: center;            
            z-index: 100;            
            opacity: 0;            
            pointer-events: none;            
            transition: all 0.3s ease;        
        }
        .playlist-modal.open {            
            opacity: 1;            
            pointer-events: auto;        
        }
        .modal-content {            
            background: var(--popup-bg);            
            border: 1px solid rgba(255, 255, 255, 0.1);            
            width: 90%;            
            max-width: 450px;            
            height: 70vh;            
            border-radius: 24px;            
            padding: 25px;            
            display: flex;            
            flex-direction: column;            
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);            
            transform: scale(0.9);            
            transition: all 0.3s ease;        
        }
        .playlist-modal.open .modal-content {            
            transform: scale(1);        
        }
        .modal-header {            
            display: flex;            
            justify-content: space-between;            
            align-items: center;            
            margin-bottom: 20px;            
            padding-bottom: 10px;            
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);        
        }
        .modal-header h3 {            
            font-size: 1.2rem;        
        }
        .close-btn {            
            background: none;            
            border: none;            
            color: var(--text-muted);            
            font-size: 1.4rem;            
            cursor: pointer;        
        }
        .close-btn:hover {            
            color: var(--primary);        
        }
        /* Video List Scroll Area */        
        .video-list {            
            overflow-y: auto;            
            flex-grow: 1;            
            padding-right: 5px;        
        }
        /* Custom Scrollbar */        
        .video-list::-webkit-scrollbar {            
            width: 6px;        
        }                
        .video-list::-webkit-scrollbar-thumb {            
            background: rgba(255, 255, 255, 0.2);            
            border-radius: 3px;        
        }
        .video-item {            
            display: flex;            
            align-items: center;            
            gap: 15px;            
            padding: 12px;            
            border-radius: 12px;            
            cursor: pointer;            
            margin-bottom: 8px;            
            transition: background 0.2s;            
            border: 1px solid transparent;        
        }
        .video-item:hover {            
            background: rgba(255, 255, 255, 0.05);        
        }
        .video-item.active {            
            background: rgba(255, 71, 87, 0.15);            
            border-color: rgba(255, 71, 87, 0.3);        
        }
        .video-item.active .video-title-text {            
            color: var(--primary);            
            font-weight: 600;        
        }
        .video-index {            
            font-size: 0.85rem;            
            color: var(--text-muted);            
            min-width: 20px;        
        }
        .video-title-text {            
            font-size: 0.9rem;            
            white-space: nowrap;            
            overflow: hidden;            
            text-overflow: ellipsis;            
            flex-grow: 1;            
            text-align: left;        
        }
        #status {            
            font-size: 0.75rem;             
            display:none;            
            color: var(--primary);            
            margin-top: 10px;            
            font-weight: bold;            
            letter-spacing: 1px;        
        }
        /* Inline Profile Card Style Cleanup */        
        .profile-card {             
             font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;             
             max-width: 100%;             
             margin: 2px 0px 2px 3px;        
        }        
        .social-icons {             
             display: flex;             
             gap: 15px;             
             justify-content: center;        
        }        
        .icon {             
             text-decoration: none;             
             font-size: 1.2rem;             
             width: 45px;             
             height: 45px;             
             display: flex;             
             align-items: center;             
             justify-content: center;             
             border-radius: 50%;             
             background: transparent;            
             border: 1px solid rgba(255, 255, 255, 0.1);             
             color: var(--text-muted);             
             transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);        
        }        
        .icon:hover {             
             transform: translateY(-4px);             
             color: #fff;             
             border-color: transparent;        
        }        
        .twitter:hover { background: #1DA1F2; box-shadow: 0 4px 14px rgba(29, 161, 242, 0.4); }        
        .instagram:hover { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); box-shadow: 0 4px 14px rgba(220, 39, 67, 0.4); }        
        .youtube:hover { background: #FF0000; box-shadow: 0 4px 14px rgba(255, 0, 0, 0.4); }        
        .website:hover { background:#973E7C; box-shadow: 0 4px 14px rgba(255, 71, 87, 0.4); }
                .facebook:hover { background:#2878F4; box-shadow: 0 4px 14px rgba(255, 71, 87, 0.4); }
    </style>
</head>
<body>    
    <div class="blur-bg"></div>        
    <div class="player-container" id="player-card">        
        <div style="text-align: left; margin-bottom:30px;  padding: 20px 0px; margin :0px -8px;border-radius: 24px; border: 0.9px solid #888888;">            
            <div class='profile-card'>                
                <div class='social-icons'>                    
                 <a class='icon facebook' href='https://facebook.com/imgauranga' target='_blank' title='facebook / X'><i class='fab fa-facebook'></i></a>     <a class='icon twitter' href='https://x.com/imgauranga' target='_blank' title='Twitter / X'><i class='fab fa-twitter'></i></a>                    
                    <a class='icon instagram' href='https://instagram.com/imgauranga' target='_blank' title='Instagram'><i class='fab fa-instagram'></i></a>                    
                    <a class='icon youtube' href='https://youtube.com/@imgauranga' target='_blank' title='YouTube'><i class='fab fa-youtube'></i></a>                
                    <a class='icon website' href='https://sites.google.com/view/imgauranga' target='_blank' title='Website'><i class='fas fa-globe'></i></a>
                </div>            
            </div>        
        </div>        
        <button class="btn btn-playlist" id="open-playlist-btn">            
            <i class="fas fa-list-ul"></i> View Video Playlist        
        </button>        
        <div id="status">INITIALIZING</div>        
        <div class="video-wrapper">            
            <div id="yt-player"></div>        
        </div>        
        <div class="track-info">            
            <h2 id="video-title">Loading Channel Videos...</h2>            
            <p>@imgauranga latest updates</p>        
        </div>        
        <div class="progress-area" id="progress-area">            
            <div class="progress-bar" id="progress-bar"></div>        
        </div>        
        <div class="time-duration">            
            <span id="current-time">0:00</span>            
            <span id="total-duration">0:00</span>        
        </div>        
        <div class="controls">            
            <button class="btn" id="prev-btn"><i class="fas fa-backward-step"></i></button>            
            <button class="btn btn-play" id="play-btn"><i class="fas fa-play" id="play-icon"></i></button>            
            <button class="btn" id="next-btn"><i class="fas fa-forward-step"></i></button>        
        </div>    
    </div>    
    <div class="playlist-modal" id="playlist-modal">        
        <div class="modal-content">            
            <div class="modal-header">                
                <h3>Channel Playlist</h3>                
                <button class="close-btn" id="close-playlist-btn"><i class="fas fa-xmark"></i></button>            
            </div>            
            <div class="video-list" id="video-list-container">                
                <div style="text-align:center; padding:20px; color:var(--text-muted);">Loading playlist tracks...</div>            
            </div>        
        </div>    
    </div>    
    <script>        
const channelId = "UC1nFkD-hhV4iytgOTS5pv4A";        
        const playlistId = channelId.replace(/^UC/, "UU");         
        let player;        
        let progressTimer;        
        let isPlayerReady = false;        
        const playerCard = document.getElementById('player-card');        
        const playBtn = document.getElementById('play-btn');        
        const playIcon = document.getElementById('play-icon');        
        const videoTitle = document.getElementById('video-title');        
        const progressBar = document.getElementById('progress-bar');        
        const progressArea = document.getElementById('progress-area');        
        const currentTimeEl = document.getElementById('current-time');        
        const durationEl = document.getElementById('total-duration');        
        const statusEl = document.getElementById('status');                
        const playlistModal = document.getElementById('playlist-modal');        
        const openPlaylistBtn = document.getElementById('open-playlist-btn');        
        const closePlaylistBtn = document.getElementById('close-playlist-btn');        
        const videoListContainer = document.getElementById('video-list-container');        
        const tag = document.createElement('script');        
        tag.src = "https://www.youtube.com/iframe_api";        
        const firstScriptTag = document.getElementsByTagName('script')[0];        
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);        
        function onYouTubeIframeAPIReady() {            
            player = new YT.Player('yt-player', {                
                height: '100%',                
                width: '100%',                
                playerVars: {                    
                    listType: 'playlist',                    
                    list: playlistId,                    
                    autoplay: 0,                    
                    controls: 1,                     
                    disablekb: 0,                    
                    fs: 1,                    
                    rel: 0                
                },                
                events: {                    
                    'onReady': onPlayerReady,                    
                    'onStateChange': onPlayerStateChange,                    
                    'onError': onPlayerError                
                }            
            });        
        }        
        function onPlayerReady(event) {            
            isPlayerReady = true;            
            statusEl.innerText = "READY";            
            buildPlaylistUI();        
        }        
        function onPlayerStateChange(event) {            
            if (event.data == YT.PlayerState.PLAYING) {                
                playerCard.classList.add('playing');                
                playIcon.className = "fas fa-pause";                
                statusEl.innerText = "PLAYING";                
                updateTrackUI();                
                startProgressLoop();            
            } else {                
                playerCard.classList.remove('playing');                
                playIcon.className = "fas fa-play";                
                clearInterval(progressTimer);                
                if (event.data == YT.PlayerState.PAUSED) {                    
                    statusEl.innerText = "PAUSED";                
                } else if (event.data == YT.PlayerState.BUFFERING) {                    
                    statusEl.innerText = "BUFFERING";                
                }            
            }        
        }        
        function onPlayerError(e) {            
            statusEl.innerText = "SKIPPING ERROR TRACK";            
            setTimeout(() => {                
                if(player && player.nextVideo) player.nextVideo();            
            }, 1500);        
        }        
        async function fetchVideoTitle(videoId, index) {            
            try {                
                const response = await fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${videoId}&format=json`);                
                if (response.ok) {                    
                    const data = await response.json();                    
                    const targetListText = document.getElementById(`title-text-${index}`);                    
                    if (targetListText && data.title) {                        
                        targetListText.innerText = data.title;                        
                        if(player && player.getPlaylistIndex && player.getPlaylistIndex() === index) {                            
                            videoTitle.innerText = data.title;                        
                        }                    
                    }                
                }            
            } catch (error) {                
                console.error("Error loading video title:", error);            
            }        
        }        
        function buildPlaylistUI() {            
            try {                
                if(!player || !player.getPlaylist) return;                
                const rawIds = player.getPlaylist();                
                if(!rawIds || rawIds.length === 0) return;                
                videoListContainer.innerHTML = "";                 
                rawIds.forEach((id, index) => {                    
                    const item = document.createElement('div');                    
                    item.className = `video-item ${index === 0 ? 'active' : ''}`;                    
                    item.setAttribute('data-index', index);                                        
                    item.innerHTML = `                        
                        <span class="video-index">${index + 1}</span>                        
                        <span class="video-title-text" id="title-text-${index}">Loading title...</span>                        
                        <i class="fas fa-video" style="font-size:0.8rem; opacity:0.5;"></i>                    
                    `;                                        
                    item.addEventListener('click', () => {                        
                        player.playVideoAt(index);                        
                        toggleModal(false);                    
                    });                                        
                    videoListContainer.appendChild(item);                    
                    fetchVideoTitle(id, index);                
                });                
                updateTrackUI();            
            } catch(e) {                
                videoListContainer.innerHTML = "<div style='color:red; text-align:center;'>Error loading playlist structure.</div>";            
            }        
        }        
        function updateTrackUI() {            
            if (!player || !player.getPlaylist || !player.getPlaylistIndex) return;                        
            const currentIndex = player.getPlaylistIndex();            
            if (currentIndex === -1) return;                        
            const targetListText = document.getElementById(`title-text-${currentIndex}`);            
            if (targetListText && targetListText.innerText !== "Loading title...") {                
                videoTitle.innerText = targetListText.innerText;            
            } else if (player.getVideoData && player.getVideoData().title) {                
                videoTitle.innerText = player.getVideoData().title;            
            } else {                
                videoTitle.innerText = `Playing Track #${currentIndex + 1}`;            
            }            
            const items = document.querySelectorAll('.video-item');            
            items.forEach((item, idx) => {                
                if (idx === currentIndex) {                    
                    item.classList.add('active');                
                } else {                    
                    item.classList.remove('active');                
                }            
            });        
        }        
        function startProgressLoop() {            
            clearInterval(progressTimer);            
            progressTimer = setInterval(() => {                
                if (player && player.getCurrentTime && player.getDuration) {                    
                    const current = player.getCurrentTime();                    
                    const duration = player.getDuration();                    
                    if (duration > 0) {                        
                        progressBar.style.width = `${(current / duration) * 100}%`;                        
                        currentTimeEl.innerText = formatTime(current);                        
                        durationEl.innerText = formatTime(duration);                    
                    }                    
                    updateTrackUI();                }            
            }, 500);        
        }        
        function formatTime(time) {            
            const mins = Math.floor(time / 60);            
            const secs = Math.floor(time % 60);            
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;        
        }        
        playBtn.addEventListener('click', () => {            
            if (!isPlayerReady) return;            
            const state = player.getPlayerState();            
            if (state == YT.PlayerState.PLAYING) {                
                player.pauseVideo();            
            } else {                
                player.playVideo();            
            }        
        });        
        document.getElementById('next-btn').addEventListener('click', () => {            
            if (isPlayerReady && player.nextVideo) player.nextVideo();        
        });        
        document.getElementById('prev-btn').addEventListener('click', () => {            
            if (isPlayerReady && player.previousVideo) player.previousVideo();        
        });        
        progressArea.addEventListener('click', (e) => {            
            if (isPlayerReady && player.getDuration) {                
                const duration = player.getDuration();                
                if(duration > 0) {                    
                    const newTime = (e.offsetX / progressArea.clientWidth) * duration;                    
                    player.seekTo(newTime, true);                
                }            
            }        
        });        
        function toggleModal(open) {            
            if (open) {                
                playlistModal.classList.add('open');                
                updateTrackUI();                 
                const activeItem = document.querySelector('.video-item.active');                
                if (activeItem) {                    
                    activeItem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });                
                }            
            } else {                
                playlistModal.classList.remove('open');            
            }        
        }        
        openPlaylistBtn.addEventListener('click', () => toggleModal(true));        
        closePlaylistBtn.addEventListener('click', () => toggleModal(false));        
        playlistModal.addEventListener('click', (e) => {            
            if(e.target === playlistModal) toggleModal(false);        
        });    
    </script>
</body>
</html>
