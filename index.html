    <script>        
        const channelId = "UC1nFkD-hhV4iytgOTS5pv4A";        
        const playlistId = channelId.replace(/^UC/, "UU");        
        let player;        
        let progressTimer;        
        let isPlayerReady = false;        
        const playerCard = document.getElementById('player-card');        
        const playBtn = document.getElementById('play-btn');        
        const playIcon = document.getElementById('play-icon');        
        const videoTitle = document.getElementById('video-title');        
        const progressBar = document.getElementById('progress-bar');        
        const progressArea = document.getElementById('progress-area');        
        const currentTimeEl = document.getElementById('current-time');        
        const durationEl = document.getElementById('total-duration');        
        const statusEl = document.getElementById('status');                
        const playlistModal = document.getElementById('playlist-modal');        
        const openPlaylistBtn = document.getElementById('open-playlist-btn');        
        const closePlaylistBtn = document.getElementById('close-playlist-btn');        
        const videoListContainer = document.getElementById('video-list-container');        
        const searchInput = document.getElementById('search-input');
        const tag = document.createElement('script');        
        tag.src = "https://www.youtube.com/iframe_api";        
        const firstScriptTag = document.getElementsByTagName('script')[0];        
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);        

        function onYouTubeIframeAPIReady() {            
            player = new YT.Player('yt-player', {            
                height: '100%',            
                width: '100%',            
                playerVars: {                
                    listType: 'playlist',                
                    list: playlistId,                
                    autoplay: 0,                
                    controls: 1,                 
                    disablekb: 0,                
                    fs: 1,                
                    rel: 0            
                },            
                events: {                
                    'onReady': onPlayerReady,                
                    'onStateChange': onPlayerStateChange,                
                    'onError': onPlayerError            
                }        
            });        
        }        

        function onPlayerReady(event) {            
            isPlayerReady = true;            
            statusEl.innerText = "READY";            
            buildPlaylistUI();        
        }        

        function onPlayerStateChange(event) {            
            if (event.data == YT.PlayerState.PLAYING) {                
                playerCard.classList.add('playing');                
                playIcon.className = "fas fa-pause";                
                statusEl.innerText = "PLAYING";                
                updateTrackUI();                
                startProgressLoop();            
            } else {                
                playerCard.classList.remove('playing');                
                playIcon.className = "fas fa-play";                
                clearInterval(progressTimer);                
                if (event.data == YT.PlayerState.PAUSED) {                    
                    statusEl.innerText = "PAUSED";                
                } else if (event.data == YT.PlayerState.BUFFERING) {                    
                    statusEl.innerText = "BUFFERING";                
                }            
            }        
        }        

        function onPlayerError(e) {            
            statusEl.innerText = "SKIPPING ERROR TRACK";            
            setTimeout(() => {                
                if(player && player.nextVideo) player.nextVideo();            
            }, 1500);        
        }        

        async function fetchVideoTitle(videoId, index) {            
            try {                
                const response = await fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${videoId}&format=json`);                
                if (response.ok) {                    
                    const data = await response.json();                    
                    const targetListText = document.getElementById(`title-text-${index}`);
                    const targetThumb = document.getElementById(`thumb-${index}`);
                    const item = document.querySelector(`[data-index="${index}"]`);
                    
                    if (targetListText && data.title) {                        
                        targetListText.innerText = data.title;
                        item.setAttribute('data-title', data.title.toLowerCase());
                        if(targetThumb) targetThumb.style.backgroundImage = `url('${data.thumbnail_url}')`;
                        if(player && player.getPlaylistIndex && player.getPlaylistIndex() === index) {                            
                            videoTitle.innerText = data.title;                        
                        }                    
                    }                
                }            
            } catch (error) {                
                console.error("Error loading video title:", error);            
            }        
        }        

        function buildPlaylistUI() {            
            try {                
                if(!player || !player.getPlaylist) return;                
                const rawIds = player.getPlaylist();                
                if(!rawIds || rawIds.length === 0) return;                
                videoListContainer.innerHTML = "";                 
                rawIds.forEach((id, index) => {                    
                    const item = document.createElement('div');                    
                    item.className = `video-item ${index === 0 ? 'active' : ''}`;                    
                    item.setAttribute('data-index', index);                                         
                    item.innerHTML = `                        
                        <div class="video-thumb" id="thumb-${index}"></div>
                        <span class="video-title-text" id="title-text-${index}">Loading title...</span>                        
                    `;                                         
                    item.addEventListener('click', () => {                        
                        player.playVideoAt(index);                        
                        toggleModal(false);                    
                    });                                         
                    videoListContainer.appendChild(item);                    
                    fetchVideoTitle(id, index);                
                });                
                updateTrackUI();            
            } catch(e) {                
                videoListContainer.innerHTML = "<div style='color:red; text-align:center;'>Error loading playlist structure.</div>";            
            }        
        }        

        // Search logic
        searchInput.addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const items = document.querySelectorAll('.video-item');
            items.forEach(item => {
                const title = item.getAttribute('data-title') || "";
                if(title.includes(searchTerm)) {
                    item.style.display = 'flex';
                } else {
                    item.style.display = 'none';
                }
            });
        });

        function updateTrackUI() {            
            if (!player || !player.getPlaylist || !player.getPlaylistIndex) return;            
            const currentIndex = player.getPlaylistIndex();            
            if (currentIndex === -1) return;            
            const targetListText = document.getElementById(`title-text-${currentIndex}`);            
            if (targetListText && targetListText.innerText !== "Loading title...") {                
                videoTitle.innerText = targetListText.innerText;            
            } else if (player.getVideoData && player.getVideoData().title) {                
                videoTitle.innerText = player.getVideoData().title;            
            } else {                
                videoTitle.innerText = `Playing Track #${currentIndex + 1}`;            
            }            
            const items = document.querySelectorAll('.video-item');            
            items.forEach((item, idx) => {                
                if (idx === currentIndex) {                    
                    item.classList.add('active');                
                } else {                    
                    item.classList.remove('active');                
                }            
            });        
        }        

        function startProgressLoop() {            
            clearInterval(progressTimer);            
            progressTimer = setInterval(() => {                
                if (player && player.getCurrentTime && player.getDuration) {                    
                    const current = player.getCurrentTime();                    
                    const duration = player.getDuration();                    
                    if (duration > 0) {                        
                        progressBar.style.width = `${(current / duration) * 100}%`;                        
                        currentTimeEl.innerText = formatTime(current);                        
                        durationEl.innerText = formatTime(duration);                    
                    }                    
                    updateTrackUI();                
                }            
            }, 500);        
        }        

        function formatTime(time) {            
            const mins = Math.floor(time / 60);            
            const secs = Math.floor(time % 60);            
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;        
        }        

        playBtn.addEventListener('click', () => {            
            if (!isPlayerReady) return;            
            const state = player.getPlayerState();            
            if (state == YT.PlayerState.PLAYING) {                
                player.pauseVideo();            
            } else {                
                player.playVideo();            
            }        
        });        
        document.getElementById('next-btn').addEventListener('click', () => {            
            if (isPlayerReady && player.nextVideo) player.nextVideo();        
        });        
        document.getElementById('prev-btn').addEventListener('click', () => {            
            if (isPlayerReady && player.previousVideo) player.previousVideo();        
        });        
        progressArea.addEventListener('click', (e) => {            
            if (isPlayerReady && player.getDuration) {                
                const duration = player.getDuration();                
                if(duration > 0) {                    
                    const newTime = (e.offsetX / progressArea.clientWidth) * duration;                    
                    player.seekTo(newTime, true);                
                }            
            }        
        });        

        function toggleModal(open) {            
            if (open) {                
                playlistModal.classList.add('open');                
                updateTrackUI();                 
                const activeItem = document.querySelector('.video-item.active');                
                if (activeItem) {                    
                    activeItem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });                
                }            
            } else {                
                playlistModal.classList.remove('open');            
            }        
        }        
        openPlaylistBtn.addEventListener('click', () => toggleModal(true));        
        closePlaylistBtn.addEventListener('click', () => toggleModal(false));        
        playlistModal.addEventListener('click', (e) => {            
            if(e.target === playlistModal) toggleModal(false);        
        });    
    </script>
    
    
<script>    
  const API_KEY = 'AIzaSyD-7ifcYbg0I4v7l44yo-KfSO7SUNU8W28';    
  const FOLDER_ID = '1oOJbTQFsfAQuHTOmwtiXA1Y1EdevxLoT';
  const trackListContainer = document.getElementById('track-list');    
  const loader = document.getElementById('loader');    
  const currentTrackTitleHtml = document.getElementById('current-track-title');    
  const masterPlayBtn = document.getElementById('master-play-btn');

  // SVG स्ट्रिंग्स (Play और Pause के लिए)
  const playSVG = `<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>`;
  const pauseSVG = `<svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>`;

  let playlist = [];     
  let currentIndex = -1;    
  let currentUtterance = null;    
  let isPlaying = false;

  async function fetchBlogPosts() {      
    try {        
      const listUrl = `https://www.googleapis.com/drive/v3/files?q='${FOLDER_ID}'+in+parents+and+mimeType='text/plain'+and+trashed=false&fields=files(id,name,modifiedTime)&key=${API_KEY}`;        
      const response = await fetch(listUrl);        
      const data = await response.json();                
      if (!data.files || data.files.length === 0) {          
        loader.innerHTML = "<span>No audio files found.</span>";          
        return;        
      }

      data.files.sort((a, b) => new Date(b.modifiedTime) - new Date(a.modifiedTime));        
      loader.style.display = 'none';

      for (let i = 0; i < data.files.length; i++) {          
        const file = data.files[i];          
        const contentUrl = `https://www.googleapis.com/drive/v3/files/${file.id}?alt=media&key=${API_KEY}`;                    
        try {            
          const contentResponse = await fetch(contentUrl);            
          const textContent = await contentResponse.text();                        
          const title = file.name.replace('.txt', '');            
          const dateObj = new Date(file.modifiedTime);            
          const date = dateObj.toLocaleDateString('en-US', { day: 'numeric', month: 'short', year: 'numeric' });

          playlist.push({              
            id: file.id,              
            title: title,              
            date: date,              
            text: textContent            
          });

          const itemIndex = playlist.length - 1;            
          const trackHTML = `              
            <div class="track-item" id="track-${itemIndex}" onclick="selectTrack(${itemIndex})">                
              <div class="track-details">                  
                <span class="track-title">${title}</span>                  
                <span class="track-meta">${date}</span>                  
              </div>                
              <div class="play-icon-indicator" id="status-${itemIndex}">▶</div>              
            </div>            
          `;            
          trackListContainer.innerHTML += trackHTML;          
        } catch (err) {            
          console.error("Fetch content error:", err);          
        }        
      }      
    } catch (error) {        
      loader.innerHTML = "<span style='color:transparent;'>Failed to load audio configuration.</span>";        
      console.error(error);      
    }    
  }

  function selectTrack(index) {      
    if (index < 0 || index >= playlist.length) return;            
    if (window.speechSynthesis) {        
      window.speechSynthesis.cancel();      
    }

    document.querySelectorAll('.track-item').forEach(el => el.classList.remove('active'));      
    document.querySelectorAll('.play-icon-indicator').forEach(el => el.innerText = '▶');            
    currentIndex = index;      
    const currentTrack = playlist[currentIndex];            
    document.getElementById(`track-${currentIndex}`).classList.add('active');      
    document.getElementById(`status-${currentIndex}`).innerText = '🎵';      
    currentTrackTitleHtml.innerText = `Now Playing: ${currentTrack.title}`;

    startSpeaking(currentTrack.text);    
  }

  function startSpeaking(text) {      
    if (!window.speechSynthesis) {        
      alert("Your browser does not support Speech Synthesis.");        
      return;      
    }      

    window.speechSynthesis.cancel(); // स्टक स्पीच को साफ़ करने के लिए

    setTimeout(() => {        
      currentUtterance = new SpeechSynthesisUtterance(text);        

      if (/[\u0980-\u09FF]/.test(text)) {          
        currentUtterance.lang = 'bn-IN';         
      } else if (/[\u0900-\u097F]/.test(text)) {          
        currentUtterance.lang = 'hi-IN';        
      } else {          
        currentUtterance.lang = 'en-US';        
      }

      currentUtterance.onend = function() {          
        playNext();        
      };

      currentUtterance.onerror = function(e) {          
        console.error("SpeechSynthesis error:", e);          
        isPlaying = false;          
        masterPlayBtn.innerHTML = playSVG;        
      };

      isPlaying = true;        
      masterPlayBtn.innerHTML = pauseSVG;        
      if(currentIndex !== -1) {          
        document.getElementById(`status-${currentIndex}`).innerText = '';        
      }        
      window.speechSynthesis.speak(currentUtterance);      
    }, 100);    
  }

  function togglePlayPause() {      
    if (playlist.length === 0) return;            
    if (currentIndex === -1) {        
      selectTrack(0);        
      return;      
    }

    if (isPlaying) {        
      window.speechSynthesis.cancel();        
      isPlaying = false;        
      masterPlayBtn.innerHTML = playSVG;        
      document.getElementById(`status-${currentIndex}`).innerText = '▶';      
    } else {        
      startSpeaking(playlist[currentIndex].text);      
    }    
  }

  function playNext() {      
    if (playlist.length === 0) return;      
    let nextIndex = currentIndex + 1;      
    if (nextIndex >= playlist.length) nextIndex = 0;      
    selectTrack(nextIndex);    
  }

  function playPrev() {      
    if (playlist.length === 0) return;      
    let prevIndex = currentIndex - 1;      
    if (prevIndex < 0) prevIndex = playlist.length - 1;      
    selectTrack(prevIndex);    
  }

  fetchBlogPosts();  
</script>

    }

<div id="heartContainer"></div>

<script>
    let lastTime = 0;

    function createHeart() {
        const container = document.getElementById('heartContainer');
        if (!container) return;

        const heart = document.createElement('div');
        heart.innerHTML = '❤️';
        heart.className = 'heart';
        
        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.color = `hsl(${Math.random() * 360}, 70%, 60%)`;
        
        container.appendChild(heart);

        setTimeout(() => {
            heart.remove();
        }, 4000);
    }

    // Tab switch issue fix karne ke liye logic
    function animate(currentTime) {
        // Agar gap 300ms se kam hai, toh mat banao (tab switch handle karne ke liye)
        if (currentTime - lastTime > 400) {
            createHeart();
            lastTime = currentTime;
        }
        requestAnimationFrame(animate);
    }

    requestAnimationFrame(animate);
</script>
