    <style>        
        :root {            
            --primary: #ff4757;            
            --bg-gradient:
            linear-gradient(165deg, #1e1e24, #111115);
             --card-bg: rgba(255, 255, 255, 0.06);            
            --text-main: #ffffff;            
            --text-muted: #eeeeee;            
            --popup-bg: rgba(20, 20, 25, 0.2);        
        }
        * {            
            margin: 0;            
            padding: 0;            
            box-sizing: border-box;            
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;        
        }
        html, body {            
            height: 100%;            
            width: 100%;            
            margin: 0;            
            padding: 0;            
            overflow: hidden;  
            text-transform: capitalize;      
        }
        html {          
            -webkit-tap-highlight-color: rgba(0,0,0,0);             
            -webkit-user-select: none;             
            -webkit-touch-callout: none;             
            -moz-user-select: none;             
            -ms-user-select: none;             
            user-select: none;             
            scrollbar-width: none;             
            -ms-overflow-style: none;         
        }             
        *::-webkit-scrollbar {             
            display: none !important;             
            width: 0px !important;             
            height: 0px !important;             
            background: transparent !important;         
        } 
        body {       
            background: var(--bg-gradient); text-align : center ;                    
            align-items: center;            
            color: var(--text-main);        
        }
        .blur-bg {            
            position: absolute;            
            width: 280px;            
            height: 280px;            
            background: var(--primary);            
            filter: blur(150px);            
            border-radius: 50%;            
            z-index: 0;            
            opacity: 0.3;            
            animation: float 6s ease-in-out infinite;        
        }
        @keyframes float {            
            0%, 100% { transform: translate(0, 0); }            
            50% { transform: translate(50px, 30px); }        
        }
        .player-container { margin-top:25px;         
            position: relative;            
            z-index: 1;            
            background: var(--card-bg);            
            backdrop-filter: blur(20px);            
            -webkit-backdrop-filter: blur(20px);            
            border-top: 2px solid rgba(255, 255, 255, 0.1); 
            border-right: 1px solid rgba(255, 255, 255, 0.1);            
            padding: 20px;            
            border-radius:18px 0px;            
            width: 380px;            
            max-width: 90%;            
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);            
            text-align: center;        
        }
        .video-wrapper {            
            position: relative;            
            width: 100%;            
            padding-bottom: 56.25%;            
            height: 0;            
            margin-bottom: 25px;            
            border-radius: 14px;            
            overflow: hidden;            
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);            
            border-top:2px solid rgba(255,255,255,0.1); }
        .video-wrapper iframe {            
            position: absolute;            
            top: 0;            
            left: 0;            
            width: 100%;            
            height: 100%;            
            border: 0;        
        }
        .track-info h2 {   display :none;        
        }
        .track-info p {    
            font-size: 0.9rem;            
            color: transparent;            
            margin-bottom:0px;        
        }
        .progress-area {            
            height: 6px;            
            width: 100%;            
            background: rgba(255, 255, 255, 0.1);            
            border-radius: 3px;            
            cursor: pointer;            
            margin-bottom:10px;            
            position: relative;        
        }
        .progress-bar {            
            height: 100%;            
            width: 0%;            
            background: var(--primary);            
            border-radius: 3px;            
            position: relative;            
            transition: width 0.1s linear;        
        }
        .time-duration {            
            display: flex;            
            justify-content: space-between;            
            font-size: 0.75rem;            
            color: var(--text-muted);            
            margin-bottom: 11px;        
        }
        .controls {            
            display: flex;            
            justify-content: center;            
            align-items: center;            
            gap: 20px;            
            margin-bottom: 15px;        
        }
        .btn {            
            background: none;            
            border: none;            
            color: var(--text-main);            
            font-size: 1.2rem;            
            cursor: pointer;            
            transition: all 0.2s ease;        
        }
        .btn:hover {            
            color: var(--primary);            
            transform: scale(1.1);        
        }
        .btn-play {            
            width: 55px;            
            height: 55px;            
            border-radius: 50%;            
            background: transparent;            
            color: white;            
            font-size: 1.4rem;            
            display: flex;            
            justify-content: center;            
            align-items: center;  
       border: 2px solid rgba(255,255,255,0.3);           
            box-shadow: 0 4px 15px rgba(255,255,255,0.1);        
        }
        .btn-play:hover {            
            color: white;            
            transform: scale(1.05);        
        }
        .btn-playlist {            
            font-size: 1rem;            
            color: var(--text-muted);            
            display: flex;            
            align-items: center;            
            gap: 8px;            
            width:100%;            
            margin: 15px 0px 30px 0px;            
            padding: 12px 16px;            
            border-radius: 20px;            
            background: rgba(255, 255, 255, 0.03);            
            border: 1px solid rgba(255, 255, 255, 0.05);        
        }
        .btn-playlist:hover {            
            background: rgba(255, 255, 255, 0.1);            
            color: var(--text-main);        
        }
        .playlist-modal {            
            position: fixed;            
            top: 0;            
            left: 0;            
            width: 100%;            
            height: 100%;            
            background: transparent;            
            backdrop-filter: blur(20px);            
            display: flex;            
            justify-content: center;            
            align-items: center;            
            z-index: 100;            
            opacity: 0;            
            pointer-events: none;            
            transition: all 0.3s ease;        
        }
        .playlist-modal.open {            
            opacity: 1;            
            pointer-events: auto;        
        }
        .modal-content {            
            background: var(--popup-bg);            
            border: 1px solid rgba(255, 255, 255, 0.1);            
            width: 90%;            
            max-width: 450px;            
            height: 80vh;            
            border-radius:24px 0px;            
            padding: 25px;            
            display: flex;            
            flex-direction: column;            
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);            
            transform: scale(0.9);            
            transition: all 0.3s ease;        
        }
        .playlist-modal.open .modal-content {            
            transform: scale(1);        
        }
        .modal-header {            
            display: flex;            
            flex-direction: column; /* Changed to column to accommodate search */
            gap: 15px;
            margin-bottom: 20px;            
            padding-bottom: 10px;            
        }
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }
        .modal-header h3 {            
            font-size: 1.2rem;        
        }
        .close-btn {            
            background: none;            
            border: none;            
            color: var(--text-muted);            
            font-size: 1.4rem;            
            cursor: pointer;        
        }
        .close-btn:hover {            
            color:var(--text-muted);        
        }
        /* Search Input Style */
       
 #search-input::placeholder {
  color: #ffffff;  opacity: 1;    }
 #search-input {
            width: 100%;
            padding:12px 13px;
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            outline: none;
        }
        .video-list {            
            overflow-y: auto;            
            flex-grow: 1;            
            padding-right: 5px;        
        }
        .video-list::-webkit-scrollbar {            
            width: 6px;        
        }          
        .video-list::-webkit-scrollbar-thumb {            
            background: rgba(255, 255, 255, 0.2);            
            border-radius: 3px;        
        }
        .video-item {            
            display: flex;            
            align-items: center;            
            gap: 15px;            
            padding: 8px;            
            border-radius:12px;            
            cursor: pointer;            
            margin-bottom: 8px;            
            transition: background 0.2s;            
            border: 1px solid transparent;        
        }
        .video-item:hover {            
            background: rgba(255, 255, 255, 0.05);        
        }
        .video-item.active {            
            background: rgba(255, 71, 87, 0.15);            
            border-color: rgba(255, 71, 87, 0.3);        
        }
        .video-thumb {
            width: 80px;
            height: 45px;
            background: #333;
            border-radius: 6px;
            flex-shrink: 0;
            background-size: cover;
            background-position: center;
        }
        .video-title-text {            
            font-size: 0.9rem;            
            width: 70%; 
            white-space: nowrap;            
            overflow: hidden;            
            text-overflow: ellipsis;            
            text-align: left;        
        }
        #status {            
            font-size: 0.75rem;             
            display:none;            
            color: var(--primary);            
            margin-top: 10px;            
            font-weight: bold;            
            letter-spacing: 1px;

        .profile-card {            
             font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;             
             max-width: 100%;             
             margin: 2px 0px 2px 3px;        
        }        
        .social-icons {             
             display: flex;             
             gap: 15px;             
             justify-content: center;        
        }        
        .icon {             
             text-decoration: none;             
             font-size: 1.2rem;             
             width: 45px;             
             height: 45px;             
             display: flex;             
             align-items: center;             
             justify-content: center;             
             border-radius: 50%;             
             background: transparent;             
             border: 1px solid rgba(255, 255, 255, 0.1);             
             color: var(--text-muted); box-shadow: inset 0 3px 5px rgba(0, 0, 0, 0.2);             
             transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);        
        }        
        .icon:hover {             
             transform: translateY(-4px);             
             color: #fff;             
             border-color: transparent;        
        }

                    <h3>Video's Playlist</h3>                
                    <button class="close-btn" id="close-playlist-btn"><i class="fas fa-xmark"></i></button>
                </div>
                <input type="text" id="search-input" placeholder="Search">
            </div>            
            <div class="video-list" id="video-list-container">                
                <div style="text-align:center; padding:20px; color:var(--text-muted);">Loading playlist tracks...</div>            
            </div>       
       </div>   
    </div>    
</center>
    <script>        
        const channelId = "UC1nFkD-hhV4iytgOTS5pv4A";        
        const playlistId = channelId.replace(/^UC/, "UU");        
        let player;        
        let progressTimer;        
        let isPlayerReady = false;        
        const playerCard = document.getElementById('player-card');        
        const playBtn = document.getElementById('play-btn');        
        const playIcon = document.getElementById('play-icon');        
        const videoTitle = document.getElementById('video-title');        
        const progressBar = document.getElementById('progress-bar');        
        const progressArea = document.getElementById('progress-area');        
        const currentTimeEl = document.getElementById('current-time');        
        const durationEl = document.getElementById('total-duration');        
        const statusEl = document.getElementById('status');                
        const playlistModal = document.getElementById('playlist-modal');        
        const openPlaylistBtn = document.getElementById('open-playlist-btn');        
        const closePlaylistBtn = document.getElementById('close-playlist-btn');        
        const videoListContainer = document.getElementById('video-list-container');        
        const searchInput = document.getElementById('search-input');
        const tag = document.createElement('script');        
        tag.src = "https://www.youtube.com/iframe_api";        
        const firstScriptTag = document.getElementsByTagName('script')[0];        
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);        

        function onYouTubeIframeAPIReady() {            
            player = new YT.Player('yt-player', {            
                height: '100%',            
                width: '100%',            
                playerVars: {                
                    listType: 'playlist',                
                    list: playlistId,                
                    autoplay: 0,                
                    controls: 1,                 
                    disablekb: 0,                
                    fs: 1,                
                    rel: 0            
                },            
                events: {                
                    'onReady': onPlayerReady,                
                    'onStateChange': onPlayerStateChange,                
                    'onError': onPlayerError            
                }        
            });        
        }        

        function onPlayerReady(event) {            
            isPlayerReady = true;            
            statusEl.innerText = "READY";            
            buildPlaylistUI();        
        }        

        function onPlayerStateChange(event) {            
            if (event.data == YT.PlayerState.PLAYING) {                
                playerCard.classList.add('playing');                
                playIcon.className = "fas fa-pause";                
                statusEl.innerText = "PLAYING";                
                updateTrackUI();                
                startProgressLoop();            
            } else {                
                playerCard.classList.remove('playing');                
                playIcon.className = "fas fa-play";                
                clearInterval(progressTimer);                
                if (event.data == YT.PlayerState.PAUSED) {                    
                    statusEl.innerText = "PAUSED";                
                } else if (event.data == YT.PlayerState.BUFFERING) {                    
                    statusEl.innerText = "BUFFERING";                
                }            
            }        
        }        

        function onPlayerError(e) {            
            statusEl.innerText = "SKIPPING ERROR TRACK";            
            setTimeout(() => {                
                if(player && player.nextVideo) player.nextVideo();            
            }, 1500);        
        }        

        async function fetchVideoTitle(videoId, index) {            
            try {                
                const response = await fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${videoId}&format=json`);                
                if (response.ok) {                    
                    const data = await response.json();                    
                    const targetListText = document.getElementById(`title-text-${index}`);
                    const targetThumb = document.getElementById(`thumb-${index}`);
                    const item = document.querySelector(`[data-index="${index}"]`);
                    
                    if (targetListText && data.title) {                        
                        targetListText.innerText = data.title;
                        item.setAttribute('data-title', data.title.toLowerCase());
                        if(targetThumb) targetThumb.style.backgroundImage = `url('${data.thumbnail_url}')`;
                        if(player && player.getPlaylistIndex && player.getPlaylistIndex() === index) {                            
                            videoTitle.innerText = data.title;                        
                        }                    
                    }                
                }            
            } catch (error) {                
                console.error("Error loading video title:", error);            
            }        
        }        

        function buildPlaylistUI() {            
            try {                
                if(!player || !player.getPlaylist) return;                
                const rawIds = player.getPlaylist();                
                if(!rawIds || rawIds.length === 0) return;                
                videoListContainer.innerHTML = "";                 
                rawIds.forEach((id, index) => {                    
                    const item = document.createElement('div');                    
                    item.className = `video-item ${index === 0 ? 'active' : ''}`;                    
                    item.setAttribute('data-index', index);                                         
                    item.innerHTML = `                        
                        <div class="video-thumb" id="thumb-${index}"></div>
                        <span class="video-title-text" id="title-text-${index}">Loading title...</span>                        
                    `;                                         
                    item.addEventListener('click', () => {                        
                        player.playVideoAt(index);                        
                        toggleModal(false);                    
                    });                                         
                    videoListContainer.appendChild(item);                    
                    fetchVideoTitle(id, index);                
                });                
                updateTrackUI();            
            } catch(e) {                
                videoListContainer.innerHTML = "<div style='color:red; text-align:center;'>Error loading playlist structure.</div>";            
            }        
        }        

        // Search logic
        searchInput.addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const items = document.querySelectorAll('.video-item');
            items.forEach(item => {
                const title = item.getAttribute('data-title') || "";
                if(title.includes(searchTerm)) {
                    item.style.display = 'flex';
                } else {
                    item.style.display = 'none';
                }
            });
        });

        function updateTrackUI() {            
            if (!player || !player.getPlaylist || !player.getPlaylistIndex) return;            
            const currentIndex = player.getPlaylistIndex();            
            if (currentIndex === -1) return;            
            const targetListText = document.getElementById(`title-text-${currentIndex}`);            
            if (targetListText && targetListText.innerText !== "Loading title...") {                
                videoTitle.innerText = targetListText.innerText;            
            } else if (player.getVideoData && player.getVideoData().title) {                
                videoTitle.innerText = player.getVideoData().title;            
            } else {                
                videoTitle.innerText = `Playing Track #${currentIndex + 1}`;            
            }            
            const items = document.querySelectorAll('.video-item');            
            items.forEach((item, idx) => {                
                if (idx === currentIndex) {                    
                    item.classList.add('active');                
                } else {                    
                    item.classList.remove('active');                
                }            
            });        
        }        

        function startProgressLoop() {            
            clearInterval(progressTimer);            
            progressTimer = setInterval(() => {                
                if (player && player.getCurrentTime && player.getDuration) {                    
                    const current = player.getCurrentTime();                    
                    const duration = player.getDuration();                    
                    if (duration > 0) {                        
                        progressBar.style.width = `${(current / duration) * 100}%`;                        
                        currentTimeEl.innerText = formatTime(current);                        
                        durationEl.innerText = formatTime(duration);                    
                    }                    
                    updateTrackUI();                
                }            
            }, 500);        
        }        

        function formatTime(time) {            
            const mins = Math.floor(time / 60);            
            const secs = Math.floor(time % 60);            
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;        
        }        

        playBtn.addEventListener('click', () => {            
            if (!isPlayerReady) return;            
            const state = player.getPlayerState();            
            if (state == YT.PlayerState.PLAYING) {                
                player.pauseVideo();            
            } else {                
                player.playVideo();            
            }        
        });        
        document.getElementById('next-btn').addEventListener('click', () => {            
            if (isPlayerReady && player.nextVideo) player.nextVideo();        
        });        
        document.getElementById('prev-btn').addEventListener('click', () => {            
            if (isPlayerReady && player.previousVideo) player.previousVideo();        
        });        
        progressArea.addEventListener('click', (e) => {            
            if (isPlayerReady && player.getDuration) {                
                const duration = player.getDuration();                
                if(duration > 0) {                    
                    const newTime = (e.offsetX / progressArea.clientWidth) * duration;                    
                    player.seekTo(newTime, true);                
                }            
            }        
        });        

        function toggleModal(open) {            
            if (open) {                
                playlistModal.classList.add('open');                
                updateTrackUI();                 
                const activeItem = document.querySelector('.video-item.active');                
                if (activeItem) {                    
                    activeItem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });                
                }            
            } else {                
                playlistModal.classList.remove('open');            
            }        
        }        
        openPlaylistBtn.addEventListener('click', () => toggleModal(true));        
        closePlaylistBtn.addEventListener('click', () => toggleModal(false));        
        playlistModal.addEventListener('click', (e) => {            
            if(e.target === playlistModal) toggleModal(false);        
        });    
    </script>
    
    
<script>    
  const API_KEY = 'AIzaSyD-7ifcYbg0I4v7l44yo-KfSO7SUNU8W28';    
  const FOLDER_ID = '1oOJbTQFsfAQuHTOmwtiXA1Y1EdevxLoT';
  const trackListContainer = document.getElementById('track-list');    
  const loader = document.getElementById('loader');    
  const currentTrackTitleHtml = document.getElementById('current-track-title');    
  const masterPlayBtn = document.getElementById('master-play-btn');

  // SVG स्ट्रिंग्स (Play और Pause के लिए)
  const playSVG = `<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>`;
  const pauseSVG = `<svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>`;

  let playlist = [];     
  let currentIndex = -1;    
  let currentUtterance = null;    
  let isPlaying = false;

  async function fetchBlogPosts() {      
    try {        
      const listUrl = `https://www.googleapis.com/drive/v3/files?q='${FOLDER_ID}'+in+parents+and+mimeType='text/plain'+and+trashed=false&fields=files(id,name,modifiedTime)&key=${API_KEY}`;        
      const response = await fetch(listUrl);        
      const data = await response.json();                
      if (!data.files || data.files.length === 0) {          
        loader.innerHTML = "<span>No audio files found.</span>";          
        return;        
      }

      data.files.sort((a, b) => new Date(b.modifiedTime) - new Date(a.modifiedTime));        
      loader.style.display = 'none';

      for (let i = 0; i < data.files.length; i++) {          
        const file = data.files[i];          
        const contentUrl = `https://www.googleapis.com/drive/v3/files/${file.id}?alt=media&key=${API_KEY}`;                    
        try {            
          const contentResponse = await fetch(contentUrl);            
          const textContent = await contentResponse.text();                        
          const title = file.name.replace('.txt', '');            
          const dateObj = new Date(file.modifiedTime);            
          const date = dateObj.toLocaleDateString('en-US', { day: 'numeric', month: 'short', year: 'numeric' });

          playlist.push({              
            id: file.id,              
            title: title,              
            date: date,              
            text: textContent            
          });

          const itemIndex = playlist.length - 1;            
          const trackHTML = `              
            <div class="track-item" id="track-${itemIndex}" onclick="selectTrack(${itemIndex})">                
              <div class="track-details">                  
                <span class="track-title">${title}</span>                  
                <span class="track-meta">${date}</span>                  
              </div>                
              <div class="play-icon-indicator" id="status-${itemIndex}">▶</div>              
            </div>            
          `;            
          trackListContainer.innerHTML += trackHTML;          
        } catch (err) {            
          console.error("Fetch content error:", err);          
        }        
      }      
    } catch (error) {        
      loader.innerHTML = "<span style='color:transparent;'>Failed to load audio configuration.</span>";        
      console.error(error);      
    }    
  }

  function selectTrack(index) {      
    if (index < 0 || index >= playlist.length) return;            
    if (window.speechSynthesis) {        
      window.speechSynthesis.cancel();      
    }

    document.querySelectorAll('.track-item').forEach(el => el.classList.remove('active'));      
    document.querySelectorAll('.play-icon-indicator').forEach(el => el.innerText = '▶');            
    currentIndex = index;      
    const currentTrack = playlist[currentIndex];            
    document.getElementById(`track-${currentIndex}`).classList.add('active');      
    document.getElementById(`status-${currentIndex}`).innerText = '🎵';      
    currentTrackTitleHtml.innerText = `Now Playing: ${currentTrack.title}`;

    startSpeaking(currentTrack.text);    
  }

  function startSpeaking(text) {      
    if (!window.speechSynthesis) {        
      alert("Your browser does not support Speech Synthesis.");        
      return;      
    }      

    window.speechSynthesis.cancel(); // स्टक स्पीच को साफ़ करने के लिए

    setTimeout(() => {        
      currentUtterance = new SpeechSynthesisUtterance(text);        

      if (/[\u0980-\u09FF]/.test(text)) {          
        currentUtterance.lang = 'bn-IN';         
      } else if (/[\u0900-\u097F]/.test(text)) {          
        currentUtterance.lang = 'hi-IN';        
      } else {          
        currentUtterance.lang = 'en-US';        
      }

      currentUtterance.onend = function() {          
        playNext();        
      };

      currentUtterance.onerror = function(e) {          
        console.error("SpeechSynthesis error:", e);          
        isPlaying = false;          
        masterPlayBtn.innerHTML = playSVG;        
      };

      isPlaying = true;        
      masterPlayBtn.innerHTML = pauseSVG;        
      if(currentIndex !== -1) {          
        document.getElementById(`status-${currentIndex}`).innerText = '';        
      }        
      window.speechSynthesis.speak(currentUtterance);      
    }, 100);    
  }

  function togglePlayPause() {      
    if (playlist.length === 0) return;            
    if (currentIndex === -1) {        
      selectTrack(0);        
      return;      
    }

    if (isPlaying) {        
      window.speechSynthesis.cancel();        
      isPlaying = false;        
      masterPlayBtn.innerHTML = playSVG;        
      document.getElementById(`status-${currentIndex}`).innerText = '▶';      
    } else {        
      startSpeaking(playlist[currentIndex].text);      
    }    
  }

  function playNext() {      
    if (playlist.length === 0) return;      
    let nextIndex = currentIndex + 1;      
    if (nextIndex >= playlist.length) nextIndex = 0;      
    selectTrack(nextIndex);    
  }

  function playPrev() {      
    if (playlist.length === 0) return;      
    let prevIndex = currentIndex - 1;      
    if (prevIndex < 0) prevIndex = playlist.length - 1;      
    selectTrack(prevIndex);    
  }

  fetchBlogPosts();  
</script>
    
</body>
</html>
